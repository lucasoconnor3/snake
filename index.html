<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake (Browser)</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --grid: #1f2937;
      --snake: #22c55e;
      --food: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 45%, #020617 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
    }

    .game {
      width: min(92vw, 640px);
      background: color-mix(in oklab, var(--panel) 88%, black);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    canvas {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      display: block;
      background: var(--grid);
      border: 1px solid #334155;
      border-radius: 8px;
      margin: 0 auto;
      image-rendering: pixelated;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
    }

    button {
      border: 1px solid #475569;
      background: #1e293b;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <main class="game">
    <div class="topbar">
      <strong>Snake</strong>
      <div id="score" class="meta">Score: 0</div>
    </div>
    <canvas id="board" width="600" height="600" aria-label="Snake Game Board"></canvas>
    <div class="actions">
      <div>Use arrow keys or WASD. Press Space to restart after game over.</div>
      <button id="restartBtn" type="button">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    const cellSize = 24;
    const cells = canvas.width / cellSize;
    const tickMs = 100;

    let snake;
    let dir;
    let queuedDir;
    let food;
    let score;
    let gameOver;
    let loopId;

    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function placeFood() {
      while (true) {
        const candidate = { x: randInt(cells), y: randInt(cells) };
        const onSnake = snake.some((part) => part.x === candidate.x && part.y === candidate.y);
        if (!onSnake) return candidate;
      }
    }

    function reset() {
      snake = [
        { x: 12, y: 12 },
        { x: 11, y: 12 },
        { x: 10, y: 12 }
      ];
      dir = { x: 1, y: 0 };
      queuedDir = { ...dir };
      food = placeFood();
      score = 0;
      gameOver = false;
      scoreEl.textContent = "Score: 0";
      draw();
      if (!loopId) loopId = setInterval(tick, tickMs);
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
      ctx.strokeStyle = "rgba(15, 23, 42, 0.7)";
      ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#1f2937";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const part of snake) drawCell(part.x, part.y, "#22c55e");
      drawCell(food.x, food.y, "#ef4444");

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 48px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "600 20px Segoe UI";
        ctx.fillText("Press Space or Restart", canvas.width / 2, canvas.height / 2 + 28);
      }
    }

    function outOfBounds(p) {
      return p.x < 0 || p.y < 0 || p.x >= cells || p.y >= cells;
    }

    function collidesWithSnake(p) {
      return snake.some((part) => part.x === p.x && part.y === p.y);
    }

    function tick() {
      if (gameOver) return;

      dir = queuedDir;
      const head = snake[0];
      const next = { x: head.x + dir.x, y: head.y + dir.y };

      if (outOfBounds(next) || collidesWithSnake(next)) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(next);

      if (next.x === food.x && next.y === food.y) {
        score += 1;
        scoreEl.textContent = `Score: ${score}`;
        food = placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function setDirection(next) {
      if (gameOver) return;
      if (next.x === -dir.x && next.y === -dir.y) return;
      queuedDir = next;
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "arrowup" || key === "w") setDirection({ x: 0, y: -1 });
      if (key === "arrowdown" || key === "s") setDirection({ x: 0, y: 1 });
      if (key === "arrowleft" || key === "a") setDirection({ x: -1, y: 0 });
      if (key === "arrowright" || key === "d") setDirection({ x: 1, y: 0 });
      if (key === " " && gameOver) reset();
    });

    restartBtn.addEventListener("click", reset);
    reset();
  </script>
</body>
</html>
